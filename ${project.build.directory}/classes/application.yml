server:
  port: 8080
spring:
  profiles:
    active: local
  ai:
    openai:
      api-key: ${apikey.SiliconFlow}
      base-url: https://api.siliconflow.cn
      embedding:
        options:
          model: BAAI/bge-m3
      image:
        options:
          model: Tongyi-MAI/Z-Image-Turbo
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/ai_notes
    username: root
    password: 1234
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
  data:
    redis:
      host: localhost
      port: 6379
      password: 1234

mybatis:
  configuration:
    map-underscore-to-camel-case: true #开启驼峰命名
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  type-handlers-package: com.chj.config
minio:
  endpoint: http://localhost:9000
  bucketName: ai-notes
  accessKey: minioadmin
  secretKey: minioadmin
logging:
  level:
    com.chj.mapper: debug

# 硅基流多模型配置
siliconflow:
  api-key: ${apikey.SiliconFlow}
  base-url: https://api.siliconflow.cn
  default-model: Qwen/Qwen3-8B
  models:
    - modelId: Qwen/Qwen3-8B
      modelName: 通义千问3 8B
    - modelId: deepseek-ai/DeepSeek-V3
      modelName: DeepSeek V3
    - modelId: THUDM/GLM-4-9B-Chat-1M
      modelName: GLM-4 9B